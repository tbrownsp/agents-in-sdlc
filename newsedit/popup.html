<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NewsedIt - SERVPRO Note Assistant</title>
  <style>
    body {
      width: 400px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: #24292e;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 12px 0;
      color: #0366d6;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      margin: 16px 0 8px 0;
      color: #586069;
    }
    .section {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 4px;
      color: #24292e;
    }
    input, textarea, select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #d1d5da;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      box-sizing: border-box;
    }
    textarea {
      min-height: 60px;
      resize: vertical;
    }
    button {
      width: 100%;
      padding: 8px 16px;
      background-color: #2ea44f;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
    }
    button:hover {
      background-color: #2c974b;
    }
    button:disabled {
      background-color: #94d3a2;
      cursor: not-allowed;
    }
    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 6px;
      font-size: 13px;
      text-align: center;
    }
    .status.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .status.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .help-text {
      font-size: 12px;
      color: #586069;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>📝 NewsedIt</h1>
  <p style="margin: 0 0 16px 0; font-size: 13px; color: #586069;">SERVPRO CRM Note Assistant</p>

  <h2>5-Part CRM Note Formula</h2>
  
  <div class="section">
    <label for="currentStatus">1. Current Status</label>
    <textarea id="currentStatus" placeholder="What is true now..."></textarea>
    <div class="help-text">Describe the current state of the job</div>
  </div>

  <div class="section">
    <label for="recentAction">2. Recent Action</label>
    <textarea id="recentAction" placeholder="Who was contacted or what changed..."></textarea>
    <div class="help-text">Who you contacted or what action was taken</div>
  </div>

  <div class="section">
    <label for="blocker">3. Blocker / Dependency</label>
    <textarea id="blocker" placeholder="Approval, signature, money, schedule, materials..."></textarea>
    <div class="help-text">What's blocking progress or what are we waiting on</div>
  </div>

  <div class="section">
    <label for="nextAction">4. Next Action</label>
    <textarea id="nextAction" placeholder="Exactly what happens next and who owns it..."></textarea>
    <div class="help-text">The specific next step and owner</div>
  </div>

  <div class="section">
    <label for="followUp">5. Follow-up Date/Trigger</label>
    <input type="text" id="followUp" placeholder="When to revisit or what event releases the next step...">
    <div class="help-text">Date or trigger condition for follow-up</div>
  </div>

  <button id="autoFillBtn">Auto-Fill &amp; Post Note</button>
  
  <div id="status" class="status" style="display: none;" role="status" aria-live="polite"></div>

  <script src="popup.js"></script>
</body>
</html>
