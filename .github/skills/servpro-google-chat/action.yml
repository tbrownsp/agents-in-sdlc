  SERVPRO Bartlett/Cordova Google Chat lead monitoring and crew coordination.
  Scans Chat spaces for new leads and crew updates, routes leads to pipeline-intake,
  drafts crew coordination replies and follow-up messages for Tristan's approval.
  All outbound messages are draft-only — never sent without explicit approval.

