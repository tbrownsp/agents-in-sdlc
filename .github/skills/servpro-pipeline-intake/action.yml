    - name: Emit intake draft report
      shell: bash
      run: |
        echo "======================================================"
        echo "  Pipeline Intake complete (DRAFT MODE)."
        echo "  All proposed outreach, folders, and calendar events"
        echo "  are queued for Tristan's review."
        echo "  Nothing has been sent, created, or posted."
