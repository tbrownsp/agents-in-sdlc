# Required secrets:
#   DASH_API_BASE_URL                      — Dash CRM base URL
#   DASH_API_TOKEN                         — Dash CRM API token or OAuth credentials
#   GOOGLE_WORKSPACE_SERVICE_ACCOUNT_JSON  — For Gmail draft creation
#   GOOGLE_IMPERSONATED_USER               — Tristan's Google Workspace email
#   GEMINI_API_KEY                         — Google AI Studio API key (for AI-assisted drafts)
#   GOOGLE_CLOUD_PROJECT                   — GCP project ID (Vertex AI enterprise mode)
#   GOOGLE_CLOUD_LOCATION                  — GCP region (Vertex AI enterprise mode)
# ---------------------------------------------------------------------------

