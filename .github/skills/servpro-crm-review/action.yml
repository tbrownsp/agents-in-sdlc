name: 'ServPro CRM Review'
description: >
  SERVPRO Bartlett/Cordova Dash CRM truth review and draft generation.
  Pulls all of Tristan's open jobs, produces per-job status breakdowns,
  identifies missing info and docs, flags stale communication, and generates
  CRM note drafts and Gmail follow-up drafts via Gemini AI. DRAFT ONLY —
  nothing is posted to Dash or sent until Tristan explicitly approves.

