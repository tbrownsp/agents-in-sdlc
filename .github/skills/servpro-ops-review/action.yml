name: 'ServPro Ops Review'
description: >
  SERVPRO Bartlett/Cordova Monday/Wednesday/Friday operational review.
  Produces a financial summary, crew schedule audit, photo compliance
  check, and weekly management accountability tracker. Protects mandatory
  calendar blocks. All outputs are drafts for Tristan's review.

# ---------------------------------------------------------------------------
# Required secrets:
#   GOOGLE_WORKSPACE_SERVICE_ACCOUNT_JSON  — Service account key JSON
#   GOOGLE_IMPERSONATED_USER               — Tristan's Google Workspace email
#   GDRIVE_ROOT_FOLDER_ID                  — Root "Tristan's Active Jobs" folder
#   DASH_API_BASE_URL                      — Dash CRM base URL
#   DASH_API_TOKEN                         — Dash CRM API token or OAuth credentials
# ---------------------------------------------------------------------------

