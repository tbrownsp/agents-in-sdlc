      shell: bash
      run: |
        echo "======================================================"
        echo "  POLICY: Operational review covers only Tristan's"
        echo "  assigned jobs. Other team members' jobs are excluded."
        echo "======================================================"
        # TODO: Pull job list from Dash filtered to Tristan's user ID.

    - name: Determine review day
      shell: bash
      run: |
        DAY=$(date +%A)
        echo "Today is $DAY."
        echo "Running full ops review steps regardless of day."
        echo "  → Monday:    Crew audit + full calendar audit + weekly schedule."
        echo "  → Wednesday: Midweek KPI and blocker check."
        echo "  → Friday:    Full tracker update + weekly closeout."
        # TODO: Branch logic per day of week using the $DAY variable.

    - name: Financial summary (Module 4 — Financial Review)
      shell: bash
      run: |
        echo "[DRAFT] Building financial summary."
        echo "  - Total collected this week"
        echo "  - Total owed (A/R outstanding)"
