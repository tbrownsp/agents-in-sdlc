name: 'ServPro Workspace Sync'
description: >
  SERVPRO Bartlett/Cordova Google Workspace cross-posting and alignment.
  Syncs Gmail labels, Drive folders, Calendar events, Tasks, Contacts,
  Google Photos, Docs, Forms, Sheets, and Chat. Produces a draft-only action
  sheet — no emails are sent, no files are moved without Tristan's approval.

# ---------------------------------------------------------------------------
# Required secrets (must be set in repository/environment Settings → Secrets):
#   GOOGLE_WORKSPACE_SERVICE_ACCOUNT_JSON  — Service account key JSON
#   GOOGLE_IMPERSONATED_USER               — Tristan's Google Workspace email
#   GDRIVE_ROOT_FOLDER_ID                  — Root "Tristan's Active Jobs" folder
#   GMAIL_LABELS_JSON                      — JSON map of label names to label IDs
#   GSHEETS_TRACKER_ID                     — Weekly Management Accountability Tracker ID
#   GOOGLE_CHAT_LEADS_SPACE_ID             — Chat space ID for new leads
#   GOOGLE_CHAT_CREW_SPACE_ID              — Chat space ID for crew coordination
#   DASH_API_BASE_URL                      — Dash CRM base URL
#   DASH_API_TOKEN                         — Dash CRM API token
# ---------------------------------------------------------------------------

