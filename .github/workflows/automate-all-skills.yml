# TRISTAN BROWN — MASTER RESTORATION PM AUTOMATION
# Source of Truth: Dash CRM (NextGear)
# Tone: Direct, professional, accountable — never robotic.
#
# EXECUTION ORDER (strict; each job waits for the previous):
#   Step 1 — Workspace Sync & Intake        (Modules 2 & 3)
#   Step 2 — M/W/F Operational Review       (Module 4)
#   Step 3 — CRM Draft Generation           (Module 1 — draft only, never posts)
#   Step 4 — Docs & Site Validation
#   Step 5 — WAIT FOR TRISTAN APPROVAL      (manual gate via "tristan-approval" environment)
#   Step 6 — Post Notes to Dash CRM         (EXECUTED LAST, after approval only)
#   Step 7 — Commit Automated Changes

name: Automate All Agents and Skills

on:
  # Runs automatically every day at 2:00 AM UTC
  schedule:
    - cron: '0 2 * * *'
  # Allows manual trigger from the GitHub Actions UI
  workflow_dispatch:

# Least-privilege permissions.
# `contents: write` is required for the final commit step.
# `id-token: write` is required for OIDC-based credential exchange (Google Workspace, Dash CRM).
permissions:
  contents: write
  id-token: write
  actions: read

# Prevent concurrent automation runs to avoid conflicting Dash/Drive writes.
# cancel-in-progress: false ensures an active run (especially post-approval posting) is never
# interrupted by a queued run.
concurrency:
  group: automate-all-skills
  cancel-in-progress: false

# ---------------------------------------------------------------------------
# Step 1 — Workspace Sync & Intake (Modules 2 & 3)
# Syncs Gmail labels, Drive folders, Calendar events, and processes new leads.
# Runs first so all downstream jobs have current data.
# ---------------------------------------------------------------------------
jobs:
  workspace-sync-and-intake:
    name: "Step 1 — Workspace Sync & Intake (Modules 2 & 3)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Module 3: Route new leads, draft outreach, push to Calendar/Tasks.
      - name: ServPro Pipeline Intake
        uses: ./.github/skills/servpro-pipeline-intake

      # Module 2: Sync Gmail labels, Drive folders, Photos, and Doc templates.
      - name: ServPro Workspace Sync
        uses: ./.github/skills/servpro-workspace-sync

  # ---------------------------------------------------------------------------
  # Step 2 — M/W/F Operational Review (Module 4)
  # Financial summary, crew audit, photo compliance, and meeting protection.
  # Depends on Workspace Sync completing so it reads the latest synced state.
  # ---------------------------------------------------------------------------
  operational-review:
    name: "Step 2 — M/W/F Operational Review (Module 4)"
    needs: [workspace-sync-and-intake]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: ServPro Ops Review
        uses: ./.github/skills/servpro-ops-review

  # ---------------------------------------------------------------------------
  # Step 3 — CRM Draft Generation (Module 1 — DRAFT ONLY)
  # Generates per-job CRM note drafts and follow-up email drafts.
  # NEVER posts to Dash or sends emails at this stage.
  # ---------------------------------------------------------------------------
  crm-draft-generation:
    name: "Step 3 — CRM Draft Generation (Module 1 — Draft Only)"
    needs: [operational-review]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: ServPro CRM Review (Draft only — no posting)
        uses: ./.github/skills/servpro-crm-review

  # ---------------------------------------------------------------------------
  # Step 4 — Docs & Site Validation
  # Validates workshop content, checks links, and publishes to Pages.
  # Runs in the same sequence (not blocking CRM work, but sequenced for
  # clean artifact separation before the approval gate).
  # ---------------------------------------------------------------------------
  docs-and-site-validation:
    name: "Step 4 — Docs & Site Validation"
    needs: [crm-draft-generation]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update Markdown File Index
        uses: ./.github/skills/update-markdown-file-index

      - name: Check Content Alignment
        uses: ./.github/skills/check-content-alignment

      - name: Run Localizations Check
        uses: ./.github/skills/localizations

      - name: Build and Verify Docs
        uses: ./.github/skills/build-and-verify-docs

      - name: Validate Site via Playwright
        uses: ./.github/skills/validate-site-playwright

      - name: Publish to Pages
        uses: ./.github/skills/publish-to-pages

  # ---------------------------------------------------------------------------
  # Step 5 — WAIT FOR TRISTAN APPROVAL
  # Manual gate. Nothing posts to Dash or sends communication until Tristan
  # explicitly approves in the GitHub Actions UI.
  # Requires the "tristan-approval" environment to be configured in:
  #   Repository Settings → Environments → tristan-approval
  # with "Required reviewers" set to Tristan's GitHub account.
  # ---------------------------------------------------------------------------
  await-tristan-approval:
    name: "Step 5 — WAIT FOR TRISTAN APPROVAL"
    needs: [docs-and-site-validation]
    runs-on: ubuntu-latest
    environment:
      name: tristan-approval
    steps:
      - name: Approval checkpoint
        run: |
          echo "========================================================"
          echo "  All drafts have been generated and validated."
          echo "  Review the artifacts from previous steps, then"
          echo "  approve this environment gate to post to Dash CRM."
          echo "  NOTHING has been posted to Dash or sent to anyone yet."
          echo "========================================================"

  # ---------------------------------------------------------------------------
  # Step 6 — Post Approved Notes to Dash CRM (EXECUTED LAST)
  # Only runs after Tristan has manually approved the gate above.
  # This is the ONLY step that may write to Dash or send communications.
  # ---------------------------------------------------------------------------
  post-dash-crm-notes:
    name: "Step 6 — Post Notes to Dash CRM (Executed LAST)"
    needs: [await-tristan-approval]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Post Approved Notes to Dash
        uses: ./.github/skills/servpro-post-dash-notes

  # ---------------------------------------------------------------------------
  # Step 7 — Commit Automated Changes
  # Commits any reports, logs, or config changes generated by previous steps.
  # Runs only after the Dash post step confirms clean completion.
  # ---------------------------------------------------------------------------
  commit-changes:
    name: "Step 7 — Commit Automated Changes"
    needs: [post-dash-crm-notes]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Make Repo Contribution
        uses: ./.github/skills/make-repo-contribution
