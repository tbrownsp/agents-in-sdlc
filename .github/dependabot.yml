# Dependabot configuration for the workshop site (Astro + Starlight under website/).
# The application learners build now lives at github.com/github-samples/tailspin-toys.
# Learn more: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: weekly
    groups:
      npm-development:
        dependency-type: development
        update-types:
          - minor
          - patch
      npm-production:
        dependency-type: production
        update-types:
          - patch
    ignore:
      # `typescript` is pinned to the 6.x line because our only type-checker,
      # @astrojs/check, peers on `typescript@^5 || ^6` and does not yet support
      # TypeScript 7. The TS 7 toolchain is tracked separately via the
      # `@typescript/native-preview` (tsgo) dev dependency and the `check:tsgo`
      # script. Drop this ignore once @astrojs/check supports TypeScript 7.
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
